databases:
  - name: clinica-agenda-db
    databaseName: clinica_agenda
    user: clinica_agenda

services:
  - type: web
    name: clinica-agenda
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: clinica-agenda-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: clinica-agenda-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: clinica-agenda-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: clinica-agenda-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: clinica-agenda-db
          property: password
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_NAME
        value: Dona da Clinica
      - key: ADMIN_PASSWORD
        sync: false
