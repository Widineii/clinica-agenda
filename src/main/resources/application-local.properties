server.port=${PORT:8081}

spring.datasource.url=jdbc:h2:mem:clinica;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed-demo-data=true
app.seed-admin-login=admin
app.seed-admin-password=${APP_SEED_ADMIN_PASSWORD:admin123}
app.seed-admin-name=Administrador do Sistema
