server.port=${PORT:8081}

spring.thymeleaf.cache=false

server.error.include-message=always

spring.datasource.url=jdbc:h2:file:./data/clinica-local;AUTO_SERVER=TRUE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed-demo-data=false
app.seed-carga-inicial-fixos=false
app.relatorio-mensal.auto-fechamento-local=true
app.seed-admin-login=admin
app.seed-admin-password=${APP_SEED_ADMIN_PASSWORD:Luquinha12@}
app.seed-admin-name=Administrador do Sistema
