spring.profiles.default=local

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

# Suporta varios profissionais logados ao mesmo tempo (15+ sem problema)
server.tomcat.threads.max=100
server.tomcat.accept-count=100
server.tomcat.max-connections=200
server.servlet.session.timeout=8h

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

management.endpoints.web.exposure.include=health,info

# Relatorio mensal: dia 3 gera PDF e apaga mes passado automaticamente
app.relatorio-mensal.dia-fechamento=3
app.relatorio-mensal.cron-dia-3=0 0 3 3 * *
app.relatorio-mensal.cron-fallback=0 0 6 * * *
management.endpoint.health.show-details=when_authorized
