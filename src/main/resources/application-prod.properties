server.port=${PORT:8080}

# PostgreSQL — Railway injeta DATABASE_URL ou PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

app.seed-demo-data=false
app.seed-admin-login=${ADMIN_LOGIN:}
app.seed-admin-password=${ADMIN_PASSWORD:}
app.seed-admin-name=${ADMIN_NAME:Administracao}
