server.port=${PORT:8081}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:clinica_gestao}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.seed-demo-data=false
app.seed-admin-login=${ADMIN_LOGIN:}
app.seed-admin-password=${ADMIN_PASSWORD:}
app.seed-admin-name=${ADMIN_NAME:Administracao}
