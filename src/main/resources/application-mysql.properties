server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:clinica_gestao}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

spring.thymeleaf.cache=true

logging.level.org.hibernate=WARN

app.seed-demo-data=false
app.seed-admin-login=${ADMIN_LOGIN:}
app.seed-admin-password=${ADMIN_PASSWORD:}
app.seed-admin-name=${ADMIN_NAME:Administracao}

management.health.db.enabled=true

app.infinitepay.modo-teste=${APP_INFINITEPAY_MODO_TESTE:false}
app.infinitepay.handle=${APP_INFINITEPAY_HANDLE:}
app.infinitepay.base-url=${APP_INFINITEPAY_BASE_URL:}

clinica.financeiro.polyana.enabled=${CLINICA_FINANCEIRO_POLYANA_ENABLED:true}
