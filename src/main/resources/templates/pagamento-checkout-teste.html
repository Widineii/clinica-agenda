<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout teste | InfinitePay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 480px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 text-center">
            <span class="badge text-bg-warning mb-3">Modo teste</span>
            <h1 class="h4 mb-2">Pagamento PIX simulado</h1>
            <p class="text-muted small mb-4">Este link substitui o checkout InfinitePay enquanto a InfiniteTag real nao esta configurada.</p>

            <p class="mb-1"><strong th:text="${agendamento.nomeCliente}">Cliente</strong></p>
            <p class="small text-muted mb-3"
               th:text="${agendamento.dataHoraInicio != null ? #temporals.format(agendamento.dataHoraInicio, 'dd/MM/yyyy HH:mm') : ''}">28/05/2026</p>
            <p class="h5 mb-4" th:text="${pagamentoService.formatarValorTaxaPix(agendamento)}">R$ 32,00</p>

            <form th:action="@{/pagamentos/checkout-teste/confirmar}" method="post" class="d-grid">
                <th:block th:replace="~{fragments/csrf :: token}"></th:block>
                <input type="hidden" name="order" th:value="${orderNsu}">
                <input type="hidden" name="agendamento" th:value="${agendamento.id}">
                <button type="submit" class="btn btn-success btn-lg">Confirmar PIX (teste)</button>
            </form>

            <p class="small text-muted mt-3 mb-0">Pedido: <span th:text="${orderNsu}">ag-1-abc</span></p>
        </div>
    </div>
</div>
</body>
</html>
