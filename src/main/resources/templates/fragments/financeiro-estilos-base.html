<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <th:block th:replace="~{fragments/estilos-notificacao-relatorio :: css}"></th:block>
        <style>
            :root {
                --fin-teal: #0f766e;
                --fin-teal-dark: #164e63;
                --fin-bg: #f0fdfa;
                --fin-text: #0f172a;
                --fin-muted: #64748b;
                --fin-border: rgba(15, 118, 110, 0.12);
            }

            body.financeiro-page {
                min-height: 100vh;
                margin: 0;
                font-family: 'Lato', sans-serif;
                color: var(--fin-text);
                background: linear-gradient(165deg, #ecfdf5 0%, #f8fafc 45%, #eff6ff 100%);
                padding: 24px 16px 48px;
            }

            .financeiro-wrap {
                max-width: 1100px;
                margin: 0 auto;
            }

            .financeiro-card {
                background: #fff;
                border: 1px solid var(--fin-border);
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            }

            .financeiro-card .card-body {
                padding: 1.5rem;
            }

            .financeiro-resumo-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 1rem;
            }

            .financeiro-resumo-card {
                background: #fff;
                border: 1px solid var(--fin-border);
                border-radius: 18px;
                padding: 1.25rem 1.35rem;
                box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
            }

            .financeiro-resumo-card--destaque {
                background: linear-gradient(135deg, #ecfdf5, #d1fae5);
                border-color: rgba(15, 118, 110, 0.25);
            }

            .financeiro-resumo-label {
                font-size: 0.85rem;
                color: var(--fin-muted);
                margin-bottom: 0.35rem;
            }

            .financeiro-resumo-valor {
                font-family: 'Poppins', sans-serif;
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--fin-teal-dark);
            }

            .financeiro-resumo-card--destaque .financeiro-resumo-valor {
                color: var(--fin-teal);
            }

            .financeiro-grid-principal {
                display: grid;
                grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.2fr);
                gap: 1.25rem;
                align-items: start;
            }

            .financeiro-badge-tipo {
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                border-radius: 999px;
                padding: 0.25rem 0.65rem;
            }

            .financeiro-badge-tipo--mensal {
                background: #dbeafe;
                color: #1d4ed8;
            }

            .financeiro-badge-tipo--unica {
                background: #fef3c7;
                color: #b45309;
            }

            .financeiro-table {
                margin-bottom: 0;
            }

            .financeiro-table th {
                font-size: 0.82rem;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--fin-muted);
                font-weight: 700;
                border-bottom-width: 1px;
            }

            .financeiro-table td {
                vertical-align: middle;
            }

            .financeiro-hint {
                font-size: 0.88rem;
                color: var(--fin-muted);
            }

            .financeiro-filtro-resumo {
                font-size: 0.95rem;
                color: var(--fin-text);
            }

            .financeiro-empty {
                color: var(--fin-muted);
                font-size: 0.95rem;
                padding: 0.75rem 0;
            }

            @media (max-width: 991px) {
                .financeiro-resumo-grid,
                .financeiro-grid-principal {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </th:block>
</head>
<body></body>
</html>
