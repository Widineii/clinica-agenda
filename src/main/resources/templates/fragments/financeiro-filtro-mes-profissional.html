<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="filtro (filtro, actionUrl)" class="financeiro-card mb-4">
    <div class="card-body">
        <form th:action="${actionUrl}" method="get" id="filtroMesProfissionalForm">
            <div class="row g-3 align-items-end">
                <div class="col-md-4 col-lg-3">
                    <label class="form-label fw-semibold" for="mesAno">Mes</label>
                    <input type="month"
                           class="form-control"
                           id="mesAno"
                           name="mesAno"
                           th:value="${filtro.mesAnoInput}"
                           onchange="this.form.submit()">
                </div>
                <div class="col-md-4 col-lg-4">
                    <label class="form-label fw-semibold" for="profissionalId">Profissional</label>
                    <select class="form-select"
                            id="profissionalId"
                            name="profissionalId"
                            th:disabled="${#lists.isEmpty(filtro.profissionais)}"
                            onchange="this.form.submit()">
                        <option th:if="${#lists.isEmpty(filtro.profissionais)}" value="">
                            Nenhum profissional disponivel
                        </option>
                        <option th:each="profissional : ${filtro.profissionais}"
                                th:value="${profissional.id}"
                                th:text="${profissional.nome}"
                                th:selected="${profissional.id == filtro.profissionalId}">
                            Profissional
                        </option>
                    </select>
                </div>
                <div class="col-md-4 col-lg-5">
                    <p class="mb-0 financeiro-filtro-resumo">
                        Visualizando
                        <strong th:text="${filtro.mesAnoLabelCurto}">maio 2026</strong>.
                    </p>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
