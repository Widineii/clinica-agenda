<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Erro - Agenda Affetto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7f9;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }
        .card-erro {
            width: min(520px, calc(100% - 24px));
            border: none;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        @media (max-width: 575.98px) {
            body {
                padding: 12px;
            }

            .card-erro .btn {
                display: block;
                width: 100%;
                margin: 0 0 8px 0 !important;
            }
        }
    </style>
</head>
<body>
<div class="card card-erro p-4 p-md-5 text-center">
    <p class="text-uppercase text-muted small mb-2">Agenda Affetto</p>
    <h1 class="h3 mb-3">Algo deu errado</h1>
    <p class="text-muted mb-4">
        Nao foi possivel concluir sua solicitacao.
        <span th:if="${status}" th:text="' (codigo ' + ${status} + ')'"></span>
    </p>
    <a href="/agendamentos/dashboard" class="btn btn-primary">Voltar para a agenda</a>
    <a href="/login" class="btn btn-outline-secondary ms-2">Ir para o login</a>
</div>
</body>
</html>
