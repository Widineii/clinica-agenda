<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login da Clinica</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-body-secondary">
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm w-100" style="max-width: 420px;">
        <div class="card-body p-4">
            <h1 class="h3 mb-3 text-center">Acesso ao sistema</h1>
            <p class="text-muted text-center mb-4">Cada profissional entra com o proprio login. A administracao possui acesso total.</p>

            <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

            <form th:action="@{/login}" th:object="${loginForm}" method="post" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Login</label>
                    <input th:field="*{login}" type="text" class="form-control" required autofocus>
                </div>
                <div class="col-12">
                    <label class="form-label">Senha</label>
                    <input th:field="*{senha}" type="password" class="form-control" required>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
